name: Deploy dz-sirius-frontend to production server
on:
  push:
    tags:
      - '**-prod**'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Start Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.MN_TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            *♻️ Деплой запущен*
            *🌍 Сервер:* Мечта
            *📱 Приложение:* «SiriusDZ»
            *🛠️ Тип:* Frontend

      - name: Git clone repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Create BZIP deployment package
        run: tar -cjf build-front.tar.bz2 dist/*

      - name: Copy file to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: build-front.tar.bz2
          target: ~/uploads/

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/${{ secrets.FRONTEND_FOLDER}}
            rm -rf *
            tar -C ./ -xjf ~/uploads/build-front.tar.bz2 --strip-components 1
            rm -rf ~/uploads/build-front.tar.bz2

      - name: Success Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.MN_TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            *✅ Деплой успешно завершен*
            *🌍 Сервер:* Мечта
            *📱 Приложение:* «SiriusDZ»
            *🛠️ Тип:* Frontend
            *Название коммита:* _${{ github.event.commits[0].message }}_
      - name: Failed Notification
        if: ${{ failure() }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.MN_TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            *❌ Деплой завершен неудачей*
            *🌍 Сервер:* Мечта
            *📱 Приложение:* «SiriusDZ»
            *🛠️ Тип:* Frontend
            *Название коммита:* _${{ github.event.commits[0].message }}_
